openapi: 3.0.1
info:
  title: Orders Service API
  description: "Order placement and lifecycle. Idempotent placement with synchronous gRPC stock reservation; choreographed purchase saga over Redis Streams (order.placed -> payment.* -> order.paid/failed)."
  version: v1
servers:
- url: http://localhost:8083
  description: Generated server url
tags:
- name: Orders
  description: "Buyer order placement, viewing, and cancellation"
- name: Admin
  description: "Admin order management [ADMIN]"
paths:
  /api/v1/orders:
    post:
      tags:
      - Orders
      summary: "Place an order from a cart; starts the purchase saga [BUYER]"
      description: "Idempotent on the Idempotency-Key header. Reserves all lines via gRPC before creating a PENDING order, then publishes order.placed. Repeat with the same key returns the original order (200)."
      operationId: placeOrder
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
        required: true
      responses:
        "201":
          description: "Order created (PENDING); order.placed published"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "200":
          description: "Idempotent replay; original order returned"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: "Missing Idempotency-Key header or invalid cart"
        "409":
          description: "Stock could not be reserved; lists short SKUs"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StockReservationError"
      security:
      - bearerAuth: []
    get:
      tags:
      - Orders
      summary: "List orders (own for BUYER, all for ADMIN)"
      description: "A BUYER sees only their own orders; an ADMIN sees all. Ownership is enforced in-service."
      operationId: listOrders
      parameters:
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/OrderStatus"
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseOrderResponse"
      security:
      - bearerAuth: []
  /api/v1/orders/{id}:
    get:
      tags:
      - Orders
      summary: "Get an order by id (own only for BUYER) [BUYER]"
      operationId: getOrder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "403":
          description: Not the order owner
        "404":
          description: Not found
      security:
      - bearerAuth: []
  /api/v1/orders/{id}/cancel:
    delete:
      tags:
      - Orders
      summary: "Cancel a PENDING order; publishes order.cancelled [BUYER]"
      description: "Allowed only from PENDING (enforced by the domain state machine). Publishes order.cancelled with full line items so Products releases reserved stock."
      operationId: cancelOrder
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: "Cancelled; order.cancelled published"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Not found
        "409":
          description: "Illegal transition (order not in PENDING)"
      security:
      - bearerAuth: []
  /api/v1/orders/{id}/status:
    patch:
      tags:
      - Admin
      summary: "Advance an order's status [ADMIN]"
      description: "Admin-driven fulfillment transitions, validated by the domain state machine."
      operationId: advanceOrderStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Not found
        "409":
          description: Illegal status transition
      security:
      - bearerAuth: []
components:
  schemas:
    OrderStatus:
      type: string
      enum:
      - PENDING
      - PAID
      - FAILED
      - CANCELLED
      - SHIPPED
      - DELIVERED
    PlaceOrderRequest:
      required:
      - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderLineRequest"
    OrderLineRequest:
      required:
      - productId
      - quantity
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          minimum: 1
          type: integer
          format: int32
    UpdateOrderStatusRequest:
      required:
      - status
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
    OrderItemResponse:
      description: "Line item snapshotted at placement (immune to later catalogue edits)."
      type: object
      properties:
        productId:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/OrderStatus"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
        total:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    StockReservationError:
      type: object
      properties:
        message:
          type: string
        shortfalls:
          type: array
          items:
            $ref: "#/components/schemas/StockShortfall"
    StockShortfall:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        sku:
          type: string
        requested:
          type: integer
          format: int32
        available:
          type: integer
          format: int32
        reason:
          type: string
          enum:
          - INSUFFICIENT_STOCK
          - PRODUCT_NOT_FOUND
          - PRODUCT_INACTIVE
    PagedResponseOrderResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/OrderResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
  securitySchemes:
    bearerAuth:
      type: http
      description: Access token from POST /api/v1/auth/login
      scheme: bearer
      bearerFormat: JWT
