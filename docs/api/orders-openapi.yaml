openapi: 3.0.1
info:
  title: Orders Service API
  description: "Order placement (idempotent, gRPC stock reservation) and lifecycle."
  version: v1
servers:
- url: http://localhost:8083
  description: Generated server url
tags:
- name: Orders
  description: Order placement and lifecycle
paths:
  /api/v1/orders:
    get:
      tags:
      - Orders
      summary: "List orders — own for a BUYER, all for an ADMIN"
      operationId: list
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
      security:
      - bearerAuth: []
    post:
      tags:
      - Orders
      summary: "Place an order [BUYER]; idempotent on the Idempotency-Key header"
      operationId: place
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
        required: true
      responses:
        "400":
          description: Missing Idempotency-Key or invalid body
        "201":
          description: Order placed; order.placed published
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "409":
          description: Insufficient stock
      security:
      - bearerAuth: []
  /api/v1/orders/{id}/status:
    patch:
      tags:
      - Orders
      summary: "Change an order's status [ADMIN]; enforces the lifecycle state machine"
      operationId: changeStatus
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeStatusRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
      security:
      - bearerAuth: []
  /api/v1/orders/{id}:
    get:
      tags:
      - Orders
      summary: "Get an order by id (own for a BUYER, any for an ADMIN)"
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
      security:
      - bearerAuth: []
  /api/v1/orders/{id}/cancel:
    delete:
      tags:
      - Orders
      summary: "Cancel an order while PENDING [BUYER]; publishes order.cancelled"
      operationId: cancel
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
      security:
      - bearerAuth: []
components:
  schemas:
    Line:
      required:
      - productId
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          minimum: 1
          type: integer
          format: int32
    PlaceOrderRequest:
      required:
      - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Line"
    Item:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
    ChangeStatusRequest:
      required:
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - PENDING
          - AWAITING_PAYMENT
          - PAID
          - FAILED
          - CANCELLED
  securitySchemes:
    bearerAuth:
      type: http
      description: Access token from the Users service login
      scheme: bearer
      bearerFormat: JWT
