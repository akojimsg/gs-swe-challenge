openapi: 3.0.1
info:
  title: Orders Service API
  description: "Order placement (idempotent, gRPC stock reservation) and lifecycle."
  version: v1
servers:
- url: http://localhost:8083
  description: Generated server url
tags:
- name: Orders
  description: Order placement and lifecycle
paths:
  /api/v1/orders:
    post:
      tags:
      - Orders
      summary: "Place an order [BUYER]; idempotent on the Idempotency-Key header"
      operationId: place
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
        required: true
      responses:
        "409":
          description: Insufficient stock
        "400":
          description: Missing Idempotency-Key or invalid body
        "201":
          description: Order placed; order.placed published
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OrderResponse"
      security:
      - bearerAuth: []
components:
  schemas:
    Line:
      required:
      - productId
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          minimum: 1
          type: integer
          format: int32
    PlaceOrderRequest:
      required:
      - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Line"
    Item:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
  securitySchemes:
    bearerAuth:
      type: http
      description: Access token from the Users service login
      scheme: bearer
      bearerFormat: JWT
