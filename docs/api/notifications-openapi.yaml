openapi: 3.0.1
info:
  title: Notifications Service API
  description: "Pure event consumer: subscribes to notification-triggering events, renders email templates, sends via SMTP (Mailhog locally), and records a delivery log. This REST surface exposes only the admin delivery-log read."
  version: v1
servers:
- url: http://localhost:8085
  description: Generated server url
tags:
- name: Notifications
  description: "Delivery log (read-only) [ADMIN]"
paths:
  /api/v1/notifications/logs:
    get:
      tags:
      - Notifications
      summary: "List notification delivery logs (paginated) [ADMIN]"
      description: "The only public endpoint. All sending is event-driven; this exposes the delivery log for operational visibility."
      operationId: listNotificationLogs
      parameters:
      - name: type
        in: query
        description: "Filter by notification type (e.g. order.paid, payment.failed)"
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/DeliveryStatus"
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseNotificationLogResponse"
      security:
      - bearerAuth: []
components:
  schemas:
    DeliveryStatus:
      type: string
      enum:
      - SENT
      - FAILED
    NotificationLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        type:
          description: "Triggering event type, e.g. order.paid"
          type: string
        recipient:
          type: string
        template:
          type: string
        status:
          $ref: "#/components/schemas/DeliveryStatus"
        sentAt:
          type: string
          format: date-time
    PagedResponseNotificationLogResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/NotificationLogResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
  securitySchemes:
    bearerAuth:
      type: http
      description: Access token from POST /api/v1/auth/login
      scheme: bearer
      bearerFormat: JWT
