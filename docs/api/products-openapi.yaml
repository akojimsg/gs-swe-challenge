openapi: 3.0.1
info:
  title: Products Service API
  description: "Catalogue, search, categories, admin CRUD, and CSV import."
  version: v1
servers:
- url: http://localhost:8082
  description: Generated server url
tags:
- name: Categories
  description: Public category listing
- name: Products
  description: Public catalogue reads and admin product management
paths:
  /api/v1/products/{id}:
    get:
      tags:
      - Products
      summary: Get a product by id (public)
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
    put:
      tags:
      - Products
      summary: "Replace a product [ADMIN]"
      operationId: replace
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
    delete:
      tags:
      - Products
      summary: "Delete a product [ADMIN]"
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
    patch:
      tags:
      - Products
      summary: "Partially update a product [ADMIN]"
      operationId: patch
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /api/v1/products:
    get:
      tags:
      - Products
      summary: Browse/search the catalogue (public)
      operationId: search
      parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: minPrice
        in: query
        required: false
        schema:
          type: number
      - name: maxPrice
        in: query
        required: false
        schema:
          type: number
      - name: inStock
        in: query
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: sort
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseProductResponse"
    post:
      tags:
      - Products
      summary: "Create a product [ADMIN]"
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /api/v1/categories:
    get:
      tags:
      - Categories
      summary: List all categories (public)
      operationId: list
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
components:
  schemas:
    UpdateProductRequest:
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 0
          type: string
        description:
          type: string
        category:
          type: string
        price:
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        stock:
          minimum: 0
          type: integer
          format: int32
        weightKg:
          type: number
        active:
          type: boolean
    ProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int32
        price:
          type: number
        stock:
          type: integer
          format: int32
        weightKg:
          type: number
        active:
          type: boolean
    CreateProductRequest:
      required:
      - name
      - price
      - sku
      - stock
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 0
          type: string
        sku:
          maxLength: 100
          minLength: 0
          type: string
        description:
          type: string
        category:
          type: string
        price:
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        stock:
          minimum: 0
          type: integer
          format: int32
        weightKg:
          type: number
    PagedResponseProductResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ProductResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      description: Admin access token from the Users service login
      scheme: bearer
      bearerFormat: JWT
