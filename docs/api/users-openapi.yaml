openapi: 3.0.1
info:
  title: Users Service API
  description: "Identity, authentication, and user management."
  version: v1
servers:
- url: http://localhost:8081
  description: Generated server url
tags:
- name: Authentication
  description: "Registration, login, and token issuance"
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new BUYER account and issue tokens
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: "Account created; access token returned, refresh cookie set"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation failed
        "409":
          description: Email already registered
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Authenticate with email and password and issue tokens
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: "Authenticated; access token returned, refresh cookie set"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password
components:
  schemas:
    RegisterRequest:
      required:
      - email
      - firstName
      - lastName
      - password
      type: object
      properties:
        email:
          type: string
        password:
          maxLength: 100
          minLength: 8
          type: string
        firstName:
          maxLength: 100
          minLength: 0
          type: string
        lastName:
          maxLength: 100
          minLength: 0
          type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
    LoginRequest:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
        password:
          type: string
