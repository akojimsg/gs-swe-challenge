openapi: 3.0.1
info:
  title: Users Service API
  description: "Identity, authentication, and user management."
  version: v1
servers:
- url: http://localhost:8081
  description: Generated server url
tags:
- name: Users
  description: Self-service profile and admin user management
- name: Authentication
  description: "Registration, login, and token issuance"
- name: Internal
  description: Service-to-service endpoints (private network only)
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register a new BUYER account and issue tokens
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "409":
          description: Email already registered
        "201":
          description: "Account created; access token returned, refresh cookie set"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation failed
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Rotate the refresh token and issue a new access token
      operationId: refresh
      parameters:
      - name: refresh_token
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "401":
          description: "Missing, expired, or revoked refresh token"
        "200":
          description: New access token returned; refresh cookie rotated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Revoke the refresh token and clear the session cookie
      operationId: logout
      parameters:
      - name: refresh_token
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Logged out (idempotent)
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Authenticate with email and password and issue tokens
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: "Authenticated; access token returned, refresh cookie set"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password
  /api/v1/users/{id}/role:
    patch:
      tags:
      - Users
      summary: "Change a user's role; publishes user.role_changed [ADMIN]"
      operationId: changeRole
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRoleRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
      security:
      - bearerAuth: []
  /api/v1/users/me:
    get:
      tags:
      - Users
      summary: Get the authenticated user's profile
      operationId: me
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
      security:
      - bearerAuth: []
    patch:
      tags:
      - Users
      summary: Update the authenticated user's profile
      operationId: updateMe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
      security:
      - bearerAuth: []
  /internal/users/{id}/email:
    get:
      tags:
      - Internal
      summary: Resolve a user's email by id (internal)
      operationId: emailById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserEmailResponse"
  /api/v1/users:
    get:
      tags:
      - Users
      summary: "List all users (paginated) [ADMIN]"
      operationId: list
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseUserResponse"
      security:
      - bearerAuth: []
  /api/v1/users/{id}:
    get:
      tags:
      - Users
      summary: "Get a user by id [ADMIN]"
      operationId: getById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
      security:
      - bearerAuth: []
components:
  schemas:
    RegisterRequest:
      required:
      - email
      - firstName
      - lastName
      - password
      type: object
      properties:
        email:
          type: string
        password:
          maxLength: 100
          minLength: 8
          type: string
        firstName:
          maxLength: 100
          minLength: 0
          type: string
        lastName:
          maxLength: 100
          minLength: 0
          type: string
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
    LoginRequest:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    ChangeRoleRequest:
      required:
      - role
      type: object
      properties:
        role:
          type: string
          enum:
          - BUYER
          - ADMIN
    UpdateProfileRequest:
      required:
      - firstName
      - lastName
      type: object
      properties:
        firstName:
          maxLength: 100
          minLength: 0
          type: string
        lastName:
          maxLength: 100
          minLength: 0
          type: string
    UserEmailResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
    PagedResponseUserResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/UserResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
  securitySchemes:
    bearerAuth:
      type: http
      description: Access token from POST /api/v1/auth/login
      scheme: bearer
      bearerFormat: JWT
