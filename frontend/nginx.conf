# Serve the SPA and proxy /api to the Gateway (same-origin → no CORS, cookies flow).
# $GATEWAY_URL is substituted at container start (see Dockerfile CMD).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → Gateway. Preserve Authorization + cookies (refresh token is httpOnly).
    location /api/ {
        proxy_pass ${GATEWAY_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback — every non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
