spring:
  application:
    name: gateway

  # ---------------------------------------------------------------------------
  # FROZEN ROUTE TABLE (contract surface for the parallel build).
  #
  # Routing is RESOURCE-BASED: external path /api/v1/<resource>/** maps to the
  # service that owns <resource>. No service prefix in the public URL — this
  # matches the frozen Users OpenAPI (docs/api/users-openapi.yaml), every other
  # service OpenAPI under docs/api/, and the frontend's gateway binding.
  #
  # NOTE: this supersedes the `/api/<service>/v1/...` notation in spec 12, which
  # predates the finalized service contracts. Each service owns distinct
  # top-level resources, so resource-based predicates are unambiguous.
  #
  # The Gateway lane adds the spring-cloud-starter-gateway dependency + the
  # JWT / rate-limit / circuit-breaker / request-id filters. The route table and
  # the public allow-list below are the frozen interface those filters build on.
  # ---------------------------------------------------------------------------
  cloud:
    gateway:
      routes:
      - id: users
        uri: ${USERS_URI:http://localhost:8081}
        predicates:
        - Path=/api/v1/auth/**,/api/v1/users/**
      - id: products
        uri: ${PRODUCTS_URI:http://localhost:8082}
        predicates:
        - Path=/api/v1/products/**,/api/v1/categories/**
      - id: orders
        uri: ${ORDERS_URI:http://localhost:8083}
        predicates:
        - Path=/api/v1/orders/**
      - id: payments
        uri: ${PAYMENTS_URI:http://localhost:8084}
        predicates:
        - Path=/api/v1/payments/**
      - id: notifications
        uri: ${NOTIFICATIONS_URI:http://localhost:8085}
        predicates:
        - Path=/api/v1/notifications/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# -----------------------------------------------------------------------------
# Gateway policy contract — consumed by the edge filters (built in the Gateway
# lane). Frozen here so FE, Users, and each BE lane share one source of truth.
# -----------------------------------------------------------------------------
gateway:
  # Routes that bypass JWT validation (everything else requires a valid token).
  public-routes:
  - method: POST
    path: /api/v1/auth/**          # register, login, refresh, logout
  - method: GET
    path: /api/v1/products         # public catalogue listing
  - method: GET
    path: /api/v1/products/{id}    # public product detail
  - method: GET
    path: /api/v1/categories       # public category list

  # Bucket4j rate limits (buckets held in Redis), keyed per route → 429 on exceed.
  rate-limits:
    products: { limit: 100, window: 1m, key: IP }
    auth:     { limit: 10,  window: 1m, key: IP }
    orders:   { limit: 20,  window: 1m, key: userId }
    import:   { limit: 5,   window: 1h, key: userId }
    default:  { limit: 60,  window: 1m, key: userId }

gsswec:
  jwt:
    secret: ${JWT_SECRET:change_me_base64_256_bit_secret_change_me_please}
