spring:
  application:
    name: products
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gsswec}
    username: ${POSTGRES_USER:gsswec}
    password: ${POSTGRES_PASSWORD:change_me_local_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: products_schema
    open-in-view: false
  flyway:
    enabled: true
    schemas: products_schema
    default-schema: products_schema
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082

gsswec:
  jwt:
    secret: ${JWT_SECRET:change_me_base64_256_bit_secret_change_me_please}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
