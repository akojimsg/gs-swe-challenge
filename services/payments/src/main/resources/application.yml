spring:
  application:
    name: payments
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gsswec}
    username: ${POSTGRES_USER:gsswec}
    password: ${POSTGRES_PASSWORD:change_me_local_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payments_schema
    open-in-view: false
  flyway:
    enabled: true
    schemas: payments_schema
    default-schema: payments_schema
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8084

gsswec:
  jwt:
    secret: ${JWT_SECRET:change_me_base64_256_bit_secret_change_me_please}
  payments:
    success-rate: ${PAYMENTS_SUCCESS_RATE:0.9}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
